<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三维电场线仿真 - 多点电荷系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 350px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }
        .main-content {
            flex: 1;
            position: relative;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
        }
        h1 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #4fc3f7;
            text-align: center;
        }
        h2 {
            font-size: 1.2em;
            margin: 20px 0 10px;
            color: #81d4fa;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 5px;
        }
        .charge-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .charge-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .charge-title {
            font-weight: bold;
            color: #4fc3f7;
        }
        .remove-btn {
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .remove-btn:hover {
            background: #ff1744;
        }
        .control-group {
            margin-bottom: 10px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #b0bec5;
        }
        .control-group input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }
        .control-group input[type="number"] {
            width: 100%;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .value-display {
            font-size: 0.85em;
            color: #4fc3f7;
            text-align: right;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7 0%, #2196f3 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 195, 247, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .checkbox-group input {
            margin-right: 10px;
        }
        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.9em;
            line-height: 1.6;
        }
        .color-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>⚡ 三维电场线仿真</h1>
            
            <h2>电荷列表</h2>
            <div id="charges-list"></div>
            
            <button class="btn btn-primary" onclick="addCharge()">+ 添加电荷</button>
            <button class="btn btn-secondary" onclick="resetView()">🔄 重置视角</button>
            
            <h2>显示选项</h2>
            <div class="checkbox-group">
                <input type="checkbox" id="show-field-lines" checked onchange="updateDisplay()">
                <label for="show-field-lines">显示电场线</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="show-vector-field" onchange="updateDisplay()">
                <label for="show-vector-field">显示向量场</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="show-equipotential" onchange="updateDisplay()">
                <label for="show-equipotential">显示等势面（切片）</label>
            </div>
            
            <div class="control-group">
                <label>电场线数量：<span id="line-count-display">20</span></label>
                <input type="range" id="line-count" min="5" max="50" value="20" onchange="updateFieldLines()">
            </div>
            
            <div class="control-group">
                <label>向量场密度：<span id="vector-density-display">8</span></label>
                <input type="range" id="vector-density" min="4" max="15" value="8" onchange="updateVectorField()">
            </div>
            
            <button class="btn btn-secondary" onclick="clearAllCharges()">🗑️ 清除所有电荷</button>
            <button class="btn btn-primary" onclick="loadPreset('dipole')">预设：电偶极子</button>
            <button class="btn btn-primary" onclick="loadPreset('quadrupole')">预设：四极子</button>
            <button class="btn btn-primary" onclick="loadPreset('triangle')">预设：三角形排列</button>
            
            <div class="info-panel">
                <strong>使用说明：</strong><br>
                • 拖动电荷球体可改变位置<br>
                • 使用滑块调整电荷量和坐标<br>
                • 鼠标左键旋转视角，右键平移，滚轮缩放<br>
                • 正电荷为红色，负电荷为蓝色
            </div>
        </div>
        
        <div class="main-content">
            <div id="canvas-container"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // 全局变量
        let scene, camera, renderer, controls;
        let charges = [];
        let fieldLineMeshes = [];
        let vectorFieldMeshes = [];
        let equipotentialMeshes = [];
        let chargeObjects = [];
        let selectedCharge = null;
        let raycaster, mouse;
        let isDragging = false;
        let dragPlane;

        // 初始化 Three.js 场景
        function init() {
            const container = document.getElementById('canvas-container');
            
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(8, 6, 8);
            camera.lookAt(0, 0, 0);
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            // 添加轨道控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 2;
            controls.maxDistance = 30;
            
            // 添加光源
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);
            
            const pointLight2 = new THREE.PointLight(0xffffff, 0.5, 100);
            pointLight2.position.set(-10, -10, -10);
            scene.add(pointLight2);
            
            // 添加坐标轴
            const axesHelper = new THREE.AxesHelper(5);
            scene.add(axesHelper);
            
            // 添加网格
            const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
            scene.add(gridHelper);
            
            // 初始化射线检测
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            // 创建拖拽平面
            dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
            
            // 事件监听
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            
            // 添加初始电荷
            loadPreset('dipole');
            
            // 开始动画循环
            animate();
        }

        // 窗口大小调整
        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // 计算电场
        function calculateElectricField(x, y, z) {
            let Ex = 0, Ey = 0, Ez = 0;
            const k = 8.99e9; // 库仑常数（简化）
            
            for (let charge of charges) {
                const dx = x - charge.x;
                const dy = y - charge.y;
                const dz = z - charge.z;
                const r2 = dx * dx + dy * dy + dz * dz;
                const r = Math.sqrt(r2);
                
                if (r > 0.3) { // 避免除以零
                    const E = k * charge.q / r2;
                    const factor = E / r;
                    Ex += factor * dx;
                    Ey += factor * dy;
                    Ez += factor * dz;
                }
            }
            
            return new THREE.Vector3(Ex, Ey, Ez);
        }

        // 计算电势
        function calculatePotential(x, y, z) {
            let V = 0;
            const k = 8.99e9;
            
            for (let charge of charges) {
                const dx = x - charge.x;
                const dy = y - charge.y;
                const dz = z - charge.z;
                const r = Math.sqrt(dx * dx + dy * dy + dz * dz);
                
                if (r > 0.3) {
                    V += k * charge.q / r;
                }
            }
            
            return V;
        }

        // 绘制电场线
        function drawFieldLines() {
            // 清除旧的电场线
            fieldLineMeshes.forEach(mesh => scene.remove(mesh));
            fieldLineMeshes = [];
            
            const lineCount = parseInt(document.getElementById('line-count').value);
            
            // 分离正负电荷
            const positiveCharges = charges.filter(c => c.q > 0);
            const negativeCharges = charges.filter(c => c.q < 0);
            
            // 如果只有正电荷或只有负电荷，也需要显示电场线
            if (positiveCharges.length === 0 && negativeCharges.length > 0) {
                // 只有负电荷：电场线从无穷远指向负电荷，我们从边界开始追踪
                for (let charge of negativeCharges) {
                    const linesForThisCharge = Math.max(5, Math.floor(lineCount * Math.abs(charge.q)));
                    for (let i = 0; i < linesForThisCharge; i++) {
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        
                        const direction = new THREE.Vector3(
                            Math.sin(phi) * Math.cos(theta),
                            Math.sin(phi) * Math.sin(theta),
                            Math.cos(phi)
                        );
                        
                        // 从负电荷向外反向追踪（电场线指向负电荷）
                        const points = traceFieldLineToNegative(charge.x, charge.y, charge.z, direction);
                        
                        if (points.length > 1) {
                            createFieldLine(points, false);
                        }
                    }
                }
            } else if (negativeCharges.length === 0 && positiveCharges.length > 0) {
                // 只有正电荷：电场线从正电荷指向无穷远
                for (let charge of positiveCharges) {
                    const linesForThisCharge = Math.max(5, Math.floor(lineCount * charge.q));
                    for (let i = 0; i < linesForThisCharge; i++) {
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        
                        const direction = new THREE.Vector3(
                            Math.sin(phi) * Math.cos(theta),
                            Math.sin(phi) * Math.sin(theta),
                            Math.cos(phi)
                        );
                        
                        const points = traceFieldLineFromPositive(charge.x, charge.y, charge.z, direction, true);
                        
                        if (points.length > 1) {
                            createFieldLine(points, true);
                        }
                    }
                }
            } else {
                // 既有正电荷也有负电荷
                for (let charge of positiveCharges) {
                    const linesForThisCharge = Math.max(5, Math.floor(lineCount * charge.q));
                    for (let i = 0; i < linesForThisCharge; i++) {
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        
                        const direction = new THREE.Vector3(
                            Math.sin(phi) * Math.cos(theta),
                            Math.sin(phi) * Math.sin(theta),
                            Math.cos(phi)
                        );
                        
                        const points = traceFieldLineFromPositive(charge.x, charge.y, charge.z, direction, false);
                        
                        if (points.length > 1) {
                            createFieldLine(points, true);
                        }
                    }
                }
            }
        }
        
        // 创建带箭头的电场线
        function createFieldLine(points, fromPositive) {
            if (points.length < 2) return;
            
            // 创建主线条
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ 
                color: fromPositive ? 0xff4444 : 0x4444ff,
                opacity: 0.7,
                transparent: true
            });
            
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            fieldLineMeshes.push(line);
            
            // 在线上添加多个箭头
            const arrowCount = Math.min(3, Math.floor(points.length / 20));
            if (arrowCount > 0) {
                const arrowGeometry = new THREE.ConeGeometry(0.08, 0.3, 8);
                const arrowMaterial = new THREE.MeshBasicMaterial({ 
                    color: fromPositive ? 0xff6666 : 0x6666ff 
                });
                
                for (let i = 1; i <= arrowCount; i++) {
                    const idx = Math.floor((points.length - 1) * i / (arrowCount + 1));
                    if (idx >= 0 && idx < points.length - 1) {
                        const pos = points[idx];
                        const nextPos = points[idx + 1];
                        const dir = new THREE.Vector3().subVectors(nextPos, pos).normalize();
                        
                        const arrow = new THREE.Mesh(arrowGeometry, arrowMaterial);
                        arrow.position.copy(pos);
                        arrow.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
                        scene.add(arrow);
                        fieldLineMeshes.push(arrow);
                    }
                }
            }
        }

        // 追踪电场线（从正电荷出发）
        function traceFieldLineFromPositive(startX, startY, startZ, direction, toInfinity) {
            const points = [];
            let x = startX + direction.x * 0.3;
            let y = startY + direction.y * 0.3;
            let z = startZ + direction.z * 0.3;
            
            // 第一个点要非常接近起始电荷，确保衔接
            points.push(new THREE.Vector3(x, y, z));
            
            const stepSize = 0.15;
            const maxSteps = 400;
            const boundary = 12;
            const minDistToCharge = 0.25;
            
            for (let i = 0; i < maxSteps; i++) {
                const E = calculateElectricField(x, y, z);
                const magnitude = E.length();
                
                if (magnitude < 1e-10) break;
                
                E.normalize();
                
                const dx = E.x * stepSize;
                const dy = E.y * stepSize;
                const dz = E.z * stepSize;
                
                x += dx;
                y += dy;
                z += dz;
                
                // 检查是否超出边界
                if (Math.abs(x) > boundary || Math.abs(y) > boundary || Math.abs(z) > boundary) {
                    break;
                }
                
                // 检查是否接近任何电荷（包括起始电荷）
                let reachedCharge = false;
                for (let charge of charges) {
                    const dist = Math.sqrt(
                        Math.pow(x - charge.x, 2) +
                        Math.pow(y - charge.y, 2) +
                        Math.pow(z - charge.z, 2)
                    );
                    
                    // 如果接近负电荷，说明电场线终止于此
                    if (dist < minDistToCharge && charge.q < 0) {
                        // 将终点精确设置到电荷表面
                        const approachFactor = (minDistToCharge - 0.1) / dist;
                        const finalX = x - (x - charge.x) * (1 - approachFactor * 0.5);
                        const finalY = y - (y - charge.y) * (1 - approachFactor * 0.5);
                        const finalZ = z - (z - charge.z) * (1 - approachFactor * 0.5);
                        points.push(new THREE.Vector3(finalX, finalY, finalZ));
                        reachedCharge = true;
                        break;
                    }
                    
                    // 如果回到正电荷（不应该发生），停止
                    if (dist < minDistToCharge && charge.q > 0) {
                        reachedCharge = true;
                        break;
                    }
                }
                
                if (reachedCharge) break;
                
                points.push(new THREE.Vector3(x, y, z));
            }
            
            return points;
        }
        
        // 追踪电场线（到负电荷）- 用于只有负电荷的情况
        function traceFieldLineToNegative(chargeX, chargeY, chargeZ, outwardDirection) {
            const points = [];
            
            // 从较远处开始，逆着电场方向追踪到负电荷
            const startDistance = 8;
            let x = chargeX + outwardDirection.x * startDistance;
            let y = chargeY + outwardDirection.y * startDistance;
            let z = chargeZ + outwardDirection.z * startDistance;
            
            const stepSize = 0.15;
            const maxSteps = 600;
            const minDistToCharge = 0.25;
            
            for (let i = 0; i < maxSteps; i++) {
                // 记录当前点
                points.push(new THREE.Vector3(x, y, z));
                
                const E = calculateElectricField(x, y, z);
                const magnitude = E.length();
                
                if (magnitude < 1e-10) break;
                
                // 逆着电场方向移动（因为电场线指向负电荷）
                E.normalize();
                
                const dx = -E.x * stepSize;
                const dy = -E.y * stepSize;
                const dz = -E.z * stepSize;
                
                x += dx;
                y += dy;
                z += dz;
                
                // 检查距离电荷的距离
                const dist = Math.sqrt(
                    Math.pow(x - chargeX, 2) +
                    Math.pow(y - chargeY, 2) +
                    Math.pow(z - chargeZ, 2)
                );
                
                // 接近目标负电荷，终止
                if (dist < minDistToCharge) {
                    // 精确衔接到电荷表面
                    const ratio = minDistToCharge / dist;
                    const finalX = chargeX + (x - chargeX) * ratio;
                    const finalY = chargeY + (y - chargeY) * ratio;
                    const finalZ = chargeZ + (z - chargeZ) * ratio;
                    points.push(new THREE.Vector3(finalX, finalY, finalZ));
                    break;
                }
                
                // 检查是否超出边界
                if (Math.abs(x) > 15 || Math.abs(y) > 15 || Math.abs(z) > 15) {
                    break;
                }
            }
            
            // 反转点顺序，使线条从外向内
            points.reverse();
            return points;
        }

        // 旧函数保留兼容性（不再使用）
        function traceFieldLine(startX, startY, startZ, direction, isPositive) {
            return traceFieldLineFromPositive(startX, startY, startZ, direction, false);
        }

        // 绘制向量场
        function drawVectorField() {
            // 清除旧的向量场
            vectorFieldMeshes.forEach(mesh => scene.remove(mesh));
            vectorFieldMeshes = [];
            
            if (!document.getElementById('show-vector-field').checked) return;
            
            const density = parseInt(document.getElementById('vector-density').value);
            const range = 5;
            const step = (2 * range) / density;
            
            for (let x = -range; x <= range; x += step) {
                for (let y = -range; y <= range; y += step) {
                    for (let z = -range; z <= range; z += step) {
                        // 跳过靠近电荷的位置
                        let tooClose = false;
                        for (let charge of charges) {
                            const dist = Math.sqrt(
                                Math.pow(x - charge.x, 2) +
                                Math.pow(y - charge.y, 2) +
                                Math.pow(z - charge.z, 2)
                            );
                            if (dist < 0.5) {
                                tooClose = true;
                                break;
                            }
                        }
                        
                        if (tooClose) continue;
                        
                        const E = calculateElectricField(x, y, z);
                        const magnitude = E.length();
                        
                        if (magnitude < 1e-8) continue;
                        
                        // 归一化并缩放箭头
                        E.normalize();
                        const arrowLength = Math.min(magnitude * 1e-10, 0.5);
                        
                        const arrowHelper = new THREE.ArrowHelper(
                            E,
                            new THREE.Vector3(x, y, z),
                            arrowLength,
                            0xffff00,
                            0.1,
                            0.05
                        );
                        
                        scene.add(arrowHelper);
                        vectorFieldMeshes.push(arrowHelper);
                    }
                }
            }
        }

        // 绘制等势面切片
        function drawEquipotential() {
            // 清除旧的等势面
            equipotentialMeshes.forEach(mesh => scene.remove(mesh));
            equipotentialMeshes = [];
            
            if (!document.getElementById('show-equipotential').checked) return;
            
            const planeY = 0; // XY 平面切片
            const resolution = 50;
            const range = 5;
            
            const positions = [];
            const colors = [];
            
            for (let i = 0; i < resolution; i++) {
                for (let j = 0; j < resolution; j++) {
                    const x = -range + (2 * range * i) / (resolution - 1);
                    const z = -range + (2 * range * j) / (resolution - 1);
                    
                    const V = calculatePotential(x, planeY, z);
                    
                    // 根据电势着色
                    const normalizedV = Math.tanh(V * 1e-11);
                    const r = normalizedV > 0 ? 1 : 0;
                    const b = normalizedV > 0 ? 0 : 1;
                    const g = 0.3;
                    const a = Math.abs(normalizedV) * 0.5;
                    
                    if (a > 0.1) {
                        positions.push(x, planeY, z);
                        colors.push(r, g, b, a);
                    }
                }
            }
            
            if (positions.length > 0) {
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 4));
                
                const material = new THREE.PointsMaterial({
                    size: 0.08,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.8
                });
                
                const points = new THREE.Points(geometry, material);
                scene.add(points);
                equipotentialMeshes.push(points);
            }
        }

        // 获取最大电荷量
        function getMaxCharge() {
            let maxQ = 0;
            for (let charge of charges) {
                maxQ = Math.max(maxQ, Math.abs(charge.q));
            }
            return maxQ || 1;
        }

        // 更新显示
        function updateDisplay() {
            updateFieldLines();
            updateVectorField();
            drawEquipotential();
        }

        // 更新电场线
        function updateFieldLines() {
            drawFieldLines();
        }

        // 更新向量场
        function updateVectorField() {
            drawVectorField();
        }

        // 添加电荷
        function addCharge() {
            const id = Date.now();
            const charge = {
                id: id,
                x: (Math.random() - 0.5) * 4,
                y: (Math.random() - 0.5) * 4,
                z: (Math.random() - 0.5) * 4,
                q: 1
            };
            charges.push(charge);
            createChargeObject(charge);
            renderChargesList();
            updateDisplay();
        }

        // 创建电荷的 3D 对象
        function createChargeObject(charge) {
            const radius = 0.3 + Math.abs(charge.q) * 0.1;
            const geometry = new THREE.SphereGeometry(radius, 32, 32);
            const material = new THREE.MeshPhongMaterial({
                color: charge.q > 0 ? 0xff4444 : 0x4444ff,
                emissive: charge.q > 0 ? 0x440000 : 0x000044,
                shininess: 100
            });
            
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(charge.x, charge.y, charge.z);
            sphere.userData = { chargeId: charge.id };
            
            scene.add(sphere);
            chargeObjects.push({ mesh: sphere, charge: charge });
        }

        // 更新电荷对象
        function updateChargeObjects() {
            // 清除旧的电荷对象
            chargeObjects.forEach(obj => scene.remove(obj.mesh));
            chargeObjects = [];
            
            for (let charge of charges) {
                createChargeObject(charge);
            }
        }

        // 渲染电荷列表
        function renderChargesList() {
            const container = document.getElementById('charges-list');
            
            if (charges.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#888;">暂无电荷</p>';
                return;
            }
            
            container.innerHTML = charges.map((charge, index) => `
                <div class="charge-item">
                    <div class="charge-header">
                        <span class="charge-title">
                            <span class="color-indicator" style="background:${charge.q > 0 ? '#ff4444' : '#4444ff'}"></span>
                            电荷 ${index + 1}
                        </span>
                        <button class="remove-btn" onclick="removeCharge(${charge.id})">删除</button>
                    </div>
                    <div class="control-group">
                        <label>电荷量 (q): <span class="value-display">${charge.q.toFixed(2)}</span></label>
                        <input type="range" min="-5" max="5" step="0.1" value="${charge.q}" 
                               onchange="updateCharge(${charge.id}, 'q', this.value)">
                    </div>
                    <div class="control-group">
                        <label>X 坐标: <span class="value-display">${charge.x.toFixed(2)}</span></label>
                        <input type="range" min="-5" max="5" step="0.1" value="${charge.x}" 
                               onchange="updateCharge(${charge.id}, 'x', this.value)">
                    </div>
                    <div class="control-group">
                        <label>Y 坐标: <span class="value-display">${charge.y.toFixed(2)}</span></label>
                        <input type="range" min="-5" max="5" step="0.1" value="${charge.y}" 
                               onchange="updateCharge(${charge.id}, 'y', this.value)">
                    </div>
                    <div class="control-group">
                        <label>Z 坐标: <span class="value-display">${charge.z.toFixed(2)}</span></label>
                        <input type="range" min="-5" max="5" step="0.1" value="${charge.z}" 
                               onchange="updateCharge(${charge.id}, 'z', this.value)">
                    </div>
                </div>
            `).join('');
        }

        // 更新电荷
        function updateCharge(id, property, value) {
            const charge = charges.find(c => c.id === id);
            if (charge) {
                charge[property] = parseFloat(value);
                
                // 如果是电荷量变化，需要更新球体大小和颜色
                if (property === 'q') {
                    updateChargeObjects();
                } else {
                    // 如果是位置变化，更新对应的 3D 对象
                    const obj = chargeObjects.find(o => o.charge.id === id);
                    if (obj) {
                        obj.mesh.position[property] = charge[property];
                    }
                }
                
                renderChargesList();
                updateDisplay();
            }
        }

        // 删除电荷
        function removeCharge(id) {
            charges = charges.filter(c => c.id !== id);
            updateChargeObjects();
            renderChargesList();
            updateDisplay();
        }

        // 清除所有电荷
        function clearAllCharges() {
            charges = [];
            updateChargeObjects();
            renderChargesList();
            updateDisplay();
        }

        // 加载预设
        function loadPreset(type) {
            clearAllCharges();
            
            switch(type) {
                case 'dipole':
                    charges.push({ id: Date.now(), x: -1.5, y: 0, z: 0, q: 2 });
                    charges.push({ id: Date.now() + 1, x: 1.5, y: 0, z: 0, q: -2 });
                    break;
                case 'quadrupole':
                    charges.push({ id: Date.now(), x: -1, y: 0, z: 0, q: 1 });
                    charges.push({ id: Date.now() + 1, x: 1, y: 0, z: 0, q: -1 });
                    charges.push({ id: Date.now() + 2, x: 0, y: 0, z: -1, q: 1 });
                    charges.push({ id: Date.now() + 3, x: 0, y: 0, z: 1, q: -1 });
                    break;
                case 'triangle':
                    charges.push({ id: Date.now(), x: 1.5, y: 0, z: 0, q: 1.5 });
                    charges.push({ id: Date.now() + 1, x: -1.5, y: 0, z: 0, q: -1 });
                    charges.push({ id: Date.now() + 2, x: 0, y: 0, z: 1.5, q: -1 });
                    break;
            }
            
            updateChargeObjects();
            renderChargesList();
            updateDisplay();
        }

        // 重置视角
        function resetView() {
            camera.position.set(8, 6, 8);
            camera.lookAt(0, 0, 0);
            controls.reset();
        }

        // 鼠标事件处理
        function onMouseDown(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(
                chargeObjects.map(obj => obj.mesh)
            );
            
            if (intersects.length > 0) {
                isDragging = true;
                selectedCharge = chargeObjects.find(
                    obj => obj.mesh === intersects[0].object
                ).charge;
                controls.enabled = false;
                
                // 设置拖拽平面朝向相机
                const normal = new THREE.Vector3();
                camera.position.clone().normalize().negate();
                dragPlane.setFromNormalAndCoplanarPoint(
                    normal,
                    intersects[0].point
                );
            }
        }

        function onMouseMove(event) {
            if (!isDragging || !selectedCharge) return;
            
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const intersectionPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, intersectionPoint);
            
            // 限制在合理范围内
            const boundary = 5;
            selectedCharge.x = Math.max(-boundary, Math.min(boundary, intersectionPoint.x));
            selectedCharge.y = Math.max(-boundary, Math.min(boundary, intersectionPoint.y));
            selectedCharge.z = Math.max(-boundary, Math.min(boundary, intersectionPoint.z));
            
            // 更新 3D 对象位置
            const obj = chargeObjects.find(o => o.charge.id === selectedCharge.id);
            if (obj) {
                obj.mesh.position.copy(selectedCharge);
            }
            
            renderChargesList();
            updateDisplay();
        }

        function onMouseUp() {
            isDragging = false;
            selectedCharge = null;
            controls.enabled = true;
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>

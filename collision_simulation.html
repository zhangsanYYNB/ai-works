<body>
<div class="container">
  <h1>多次碰撞与能量耗散物理模型</h1>
  <div class="subtitle">光滑面 · 粗糙面 · 弹性碰撞 · 摩擦耗散 · 平面俯视视角</div>

  <div class="controls">
    <div class="control-group">
      <label>质量比 k (M/m) <span id="k-val">9.0</span></label>
      <input type="range" id="k" min="1.5" max="50" step="0.5" value="9">
    </div>
    <div class="control-group">
      <label>初速度 v₀ <span id="v-val">300</span></label>
      <input type="range" id="v" min="100" max="600" step="10" value="300">
    </div>
    <div class="control-group">
      <label>摩擦力 f <span id="f-val">50</span></label>
      <input type="range" id="f" min="10" max="200" step="5" value="50">    </div>
    <div class="control-group">
      <label>播放速度 <span id="spd-val">1.0×</span></label>
      <input type="range" id="spd" min="0.5" max="5" step="0.5" value="1">
    </div>
    <div class="btn-group">
      <button id="start-btn" class="btn-primary">▶ 开始模拟</button>

    </div>
  </div>

  <div class="canvas-wrapper">
    <div class="canvas-title">
      <span>🎬 物理过程实时渲染 (平面俯视)</span>
      <span class="badge">相机自动跟随 · 严格防穿模</span>
    </div>
    <canvas id="anim"></canvas>
  </div>

  <div class="canvas-wrapper">
    <div class="canvas-title">
      <span>📈 位移 - 时间 轨迹图 (x-t)</span>
      <span class="badge">解析关键点 · 动态缩放</span>
    </div>
    <canvas id="graph"></canvas>
  </div>

  <div class="results">
    <div class="result-card">
      <div class="label">实际碰撞次数</div>
      <div class="value" id="actual-n">0</div>
    </div>
    <div class="result-card">
      <div class="label">大方块总路程 (px)</div>
      <div class="value" id="actual-s">0.0</div>
    </div>
    <div class="result-card theory">
      <div class="label">理论碰撞次数 N</div>
      <div class="value" id="theory-n">–</div>
    </div>

      <div class="label">理论总路程 S</div>
      <div class="value" id="theory-s">–</div>
    </div>
  </div>

  <div class="formula-card">
    <b>θ</b> = arccos[(k−1)²/(k+1)²]   |  
    <b>N</b> = ⌊π/(2θ) + 1/2⌋   |  
    <b>S</b> = (m·v₀² / 2f) · √[2k/(k²+1)] · sin(Nθ)  </div>
</div>

<script>
/* ========= 核心配置与 DOM ========= */
const animCanvas = document.getElementById('anim');
const animCtx = animCanvas.getContext('2d');
const graphCanvas = document.getElementById('graph');
const graphCtx = graphCanvas.getContext('2d');

let animSize = { w: 1000, h: 260 };
let graphSize = { w: 1000, h: 340 };

function setupCanvas(canvas, ctx, defaultH) {
  const parentWidth = canvas.parentElement.clientWidth - 32; 
  const w = Math.max(300, parentWidth);
  const h = defaultH;
  
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  
  ctx.setTransform(1, 0, 0, 1, 0, 0); 
  ctx.scale(dpr, dpr);
  
  return { w, h };
}

function initCanvases() {
  animSize = setupCanvas(animCanvas, animCtx, 260);
  graphSize = setupCanvas(graphCanvas, graphCtx, 340);
}

window.addEventListener('resize', () => {
  initCanvases();
  if (sim) { 
    drawAnim(currentTime); 
    drawGraph(currentTime); 
  } else {
    drawWelcome();
  }
});

let params = { k: 9, v0: 300, f: 50, speed: 1 };
let sim = null;
let animId = null;
let startTime = 0;
let currentTime = 0;let isRunning = false;

/* ========= 解析模拟引擎 ========= */
class Simulation {
  constructor(k, v0, f) {
    this.k = k; this.v0 = v0; this.f = f;
    this.m = 1; 
    
    this.sizeS = 26; 
    this.sizeB = 46;
    this.collDist = (this.sizeS + this.sizeB) / 2; 
    
    this.wallX = 80;
    this.junctionX = 360;
    
    this.keyframes = []; 
    this.samples = [];   
    this.totalTime = 0;
    this.collisionCount = 0;
    this.totalDistance = 0;
    
    this.run();
  }

  addKeyframe(t, xS, xB, vS, vB, aS, aB, phase) {
    this.keyframes.push({ t, xS, xB, vS, vB, aS, aB, phase });
  }

  run() {
    let t = 0;
    let xS = this.junctionX - 80; 
    let vS = this.v0;
    let xB = this.junctionX + this.sizeB / 2 + 20; 
    let vB = 0;
    
    this.addKeyframe(t, xS, xB, vS, vB, 0, 0, 'init');

    let dt = (xB - this.collDist - xS) / vS;
    t += dt;
    xS += vS * dt;
    this.addKeyframe(t, xS, xB, vS, 0, 0, 0, 'move_init');

    let maxIter = 1000;
    while (maxIter-- > 0) {
      let u = vS;
      let vS_new = (1 - this.k) / (1 + this.k) * u;
      let vB_new = 2 / (1 + this.k) * u;
      
      this.collisionCount++;
      this.addKeyframe(t, xS, xB, vS_new, vB_new, 0, 0, 'collision');      
      vS = vS_new; 
      vB = vB_new;
      if (Math.abs(vB) < 1e-3) break; 

      let aB = -this.f / (this.k * this.m);
      let tB_stop = vB / Math.abs(aB);
      let dxB = vB * tB_stop + 0.5 * aB * tB_stop * tB_stop;
      let xB_stop = xB + dxB;
      
      let xS_after_A, vS_after_A, tA;
      let aS_A = 0;
      
      let collPoint = xS + this.sizeS / 2; 
      
      if (collPoint > this.junctionX + 1) {
        aS_A = this.f / this.m; 
        let distToJunc = collPoint - this.junctionX;
        let Ek_junc = Math.max(0, 0.5 * this.m * vS * vS - this.f * distToJunc);
        
        if (Ek_junc <= 0) {
          let t_stop = Math.abs(vS) / aS_A;
          let dx_stop = vS * t_stop + 0.5 * (-aS_A) * t_stop * t_stop; 
          tA = t_stop;
          xS_after_A = xS + dx_stop;
          vS_after_A = 0;
        } else {
          let vS_junc = -Math.sqrt(2 * Ek_junc / this.m); 
          tA = (vS_junc - vS) / (-aS_A); 
          xS_after_A = this.junctionX - this.sizeS / 2; 
          vS_after_A = vS_junc;
        }
      } else {
        tA = tB_stop; 
        xS_after_A = xS + vS * tA;
        vS_after_A = vS;
      }

      t += tA;
      let xB_after_A = xB + vB * tA + 0.5 * aB * tA * tA;
      let vB_after_A = vB + aB * tA;
      this.addKeyframe(t, xS_after_A, xB_after_A, vS_after_A, vB_after_A, (collPoint > this.junctionX + 1 ? -aS_A : 0), aB, 'phase_A');
      
      xS = xS_after_A; vS = vS_after_A;
      xB = xB_after_A; vB = vB_after_A;

      if (vS === 0 && vB === 0) break; 

      if (vB > 1e-3) {
        let tB_rem = vB / Math.abs(aB);        t += tB_rem;
        xB += vB * tB_rem + 0.5 * aB * tB_rem * tB_rem;
        xS += vS * tB_rem; 
        vB = 0;
        this.addKeyframe(t, xS, xB, vS, 0, 0, 0, 'phase_B_rem');
      }

      if (vS >= 0) break; 
      
      let distToWall = xS - (this.wallX + this.sizeS / 2);
      if (distToWall < 0) distToWall = 0; 
      
      let tToWall = distToWall / Math.abs(vS);
      t += tToWall;
      xS = this.wallX + this.sizeS / 2;
      vS = Math.abs(vS); 
      this.addKeyframe(t, xS, xB, -vS, 0, 0, 0, 'hit_wall'); 
      this.addKeyframe(t, xS, xB, vS, 0, 0, 0, 'bounce');

      let distToJunc = this.junctionX - this.sizeS / 2 - xS;
      let tToJunc = distToJunc / vS;
      t += tToJunc;
      xS = this.junctionX - this.sizeS / 2;
      this.addKeyframe(t, xS, xB, vS, 0, 0, 0, 'return_junc');

      let aS_C = -this.f / this.m; 
      let distToB = xB - this.collDist - xS;
      
      let Ek_B = Math.max(0, 0.5 * this.m * vS * vS - this.f * distToB);
      if (Ek_B <= 0) {
        let t_stop = vS / Math.abs(aS_C);
        let dx_stop = vS * t_stop + 0.5 * aS_C * t_stop * t_stop;
        t += t_stop;
        xS += dx_stop;
        vS = 0;
        this.addKeyframe(t, xS, xB, 0, 0, aS_C, 0, 'stop_rough');
        break;
      }
      
      let vS_catch = Math.sqrt(2 * Ek_B / this.m);
      let t_catch = (vS_catch - vS) / aS_C;
      t += t_catch;
      xS += vS * t_catch + 0.5 * aS_C * t_catch * t_catch;
      vS = vS_catch;
      this.addKeyframe(t, xS, xB, vS, 0, aS_C, 0, 'catch');
    }
    
    this.totalTime = t;
    this.totalDistance = xB - (this.junctionX + this.sizeB / 2 + 20);
    this.generateSamples();  }

  generateSamples() {
    const step = Math.max(0.01, this.totalTime / 500);
    for (let t = 0; t <= this.totalTime; t += step) {
      this.samples.push(this.getStateAt(t));
    }
    this.samples.push(this.getStateAt(this.totalTime));
  }

  getStateAt(time) {
    if (!this.keyframes || this.keyframes.length === 0) return { t:0, xS:0, xB:0 };
    if (time <= 0) return this.keyframes[0];
    if (time >= this.totalTime) return this.keyframes[this.keyframes.length - 1];

    for (let i = 0; i < this.keyframes.length - 1; i++) {
      let k0 = this.keyframes[i];
      let k1 = this.keyframes[i + 1];
      if (time >= k0.t && time <= k1.t) {
        let dt = time - k0.t;
        let xS = k0.xS + k0.vS * dt + 0.5 * (k0.aS || 0) * dt * dt;
        let xB = k0.xB + k0.vB * dt + 0.5 * (k0.aB || 0) * dt * dt;
        
        if (xB - xS < this.collDist) {
          xS = xB - this.collDist;
        }
        
        return { t: time, xS, xB };
      }
    }
    return this.keyframes[this.keyframes.length - 1];
  }
}

/* ========= 理论计算 ========= */
function theoryCorrected(k, v0, f) {
  let E = 0.5 * 1 * v0 * v0; 
  let X = 0;
  let alpha = 4 * k / Math.pow(1 + k, 2);
  let beta = Math.pow((k - 1) / (k + 1), 2);
  let N = 0;
  let S = 0;
  
  let maxIter = 1000;
  while (E > 1e-6 && maxIter-- > 0) {
    let E_after = beta * E;
    let E_M = alpha * E;
    let dX = E_M / f;
    X += dX;
    S += dX;    N++;
    
    let dist_return = X - dX;
    if (E_after < f * dist_return) break; 
    
    E = E_after - f * dist_return - f * X;
    if (E <= 1e-6) break;
  }
  return { N, S };
}

/* ========= 渲染：动画画布 (平面俯视版) ========= */
function drawAnim(time) {
  const ctx = animCtx;
  const W = animSize.w, H = animSize.h;
  ctx.clearRect(0, 0, W, H);
  
  if (!sim) return;
  const state = sim.getStateAt(time);
  
  const maxX = Math.max(state.xS, state.xB);
  const targetCam = Math.max(0, maxX - W * 0.45);
  if (!sim._cam) sim._cam = 0;
  sim._cam += (targetCam - sim._cam) * 0.15;
  const cam = sim._cam;

  const wallScreenX = sim.wallX - cam;
  const juncScreenX = sim.junctionX - cam;

  // 1. 绘制背景 (俯视图铺满)
  // 墙
  if (wallScreenX > -50) {
    let wallW = 40;
    let drawX = Math.max(0, wallScreenX - wallW);
    let drawW = wallScreenX - drawX;
    if (drawW > 0) {
      let grd = ctx.createLinearGradient(drawX, 0, wallScreenX, 0);
      grd.addColorStop(0, '#334155');
      grd.addColorStop(1, '#475569');
      ctx.fillStyle = grd;
      ctx.fillRect(drawX, 0, drawW, H);
      
      // 墙纹理
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      for(let i = -H; i < drawW + H; i += 12) {
        ctx.beginPath();
        ctx.moveTo(drawX + i, 0);
        ctx.lineTo(drawX + i + H, H);
        ctx.stroke();      }
    }
  }

  // 光滑面
  let smoothStart = Math.max(0, wallScreenX);
  let smoothEnd = Math.min(W, juncScreenX);
  if (smoothEnd > smoothStart) {
    let grd = ctx.createLinearGradient(smoothStart, 0, smoothEnd, 0);
    grd.addColorStop(0, '#0f172a');
    grd.addColorStop(1, '#1e293b');
    ctx.fillStyle = grd;
    ctx.fillRect(smoothStart, 0, smoothEnd - smoothStart, H);
    
    ctx.strokeStyle = 'rgba(56, 189, 248, 0.08)';
    ctx.lineWidth = 1;
    for (let y = 10; y < H; y += 20) {
      ctx.beginPath();
      ctx.moveTo(smoothStart, y);
      ctx.lineTo(smoothEnd, y);
      ctx.stroke();
    }
  }

  // 粗糙面
  let roughStart = Math.max(0, juncScreenX);
  let roughEnd = W;
  if (roughEnd > roughStart) {
    let grd = ctx.createLinearGradient(roughStart, 0, roughEnd, 0);
    grd.addColorStop(0, '#451a03');
    grd.addColorStop(1, '#290f02');
    ctx.fillStyle = grd;
    ctx.fillRect(roughStart, 0, roughEnd - roughStart, H);
    
    ctx.fillStyle = 'rgba(251, 191, 36, 0.15)';
    for (let x = roughStart + 5; x < roughEnd; x += 16) {
      for (let y = 5; y < H; y += 16) {
        let offset = (Math.floor(y / 16) % 2) * 8;
        ctx.fillRect(x + offset, y, 2, 2);
      }
    }
  }

  // 交界线
  if (juncScreenX > 0 && juncScreenX < W) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.setLineDash([6, 6]);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(juncScreenX, 0);    ctx.lineTo(juncScreenX, H);
    ctx.stroke();
    ctx.setLineDash([]);
    
    ctx.fillStyle = '#94a3b8';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('光滑 / 粗糙 交界', juncScreenX, 20);
  }

  // 2. 绘制方块 (垂直居中)
  const yC = H / 2;
  const yS = yC - sim.sizeS / 2;
  const yB = yC - sim.sizeB / 2;
  const xS_screen = state.xS - cam;
  const xB_screen = state.xB - cam;

  // 计算当前速度
  let vS_cur = 0, vB_cur = 0;
  for (let i = 0; i < sim.keyframes.length - 1; i++) {
    let k0 = sim.keyframes[i];
    let k1 = sim.keyframes[i + 1];
    if (time >= k0.t && time <= k1.t) {
        let dt = time - k0.t;
        vS_cur = k0.vS + (k0.aS || 0) * dt;
        vB_cur = k0.vB + (k0.aB || 0) * dt;
        break;
    }
  }

  drawBlockTopDown(ctx, xS_screen - sim.sizeS/2, yS, sim.sizeS, sim.sizeS, '#ef4444', '#f87171', 'm');
  drawBlockTopDown(ctx, xB_screen - sim.sizeB/2, yB, sim.sizeB, sim.sizeB, '#3b82f6', '#60a5fa', 'km');

  // 速度箭头
  drawArrow(ctx, xS_screen, yS - 15, vS_cur / 8, '#f87171');
  drawArrow(ctx, xB_screen, yB - 15, vB_cur / 8, '#60a5fa');

  // 碰撞标记 (在底部)
  let collIdx = 0;
  sim.keyframes.forEach((k, i) => {
    if (k.phase === 'collision') {
      collIdx++;
      let ex = k.xS - cam + sim.sizeS / 2; 
      if (ex > 0 && ex < W) {
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath(); ctx.arc(ex, H - 20, 9, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(collIdx, ex, H - 20);
        ctx.textBaseline = 'alphabetic';
      }    }
  });

  // HUD 信息
  ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
  ctx.fillRect(10, 10, 300, 34);
  ctx.strokeStyle = 'rgba(56, 189, 248, 0.3)';
  ctx.strokeRect(10, 10, 300, 34);
  ctx.fillStyle = '#e2e8f0';
  ctx.font = 'bold 13px Consolas, monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(`t = ${time.toFixed(2)}s / ${sim.totalTime.toFixed(2)}s`, 20, 27);
  ctx.fillText(`碰撞: ${sim.collisionCount}`, 180, 27);
  ctx.textBaseline = 'alphabetic';
}

function drawBlockTopDown(ctx, x, y, w, h, colorDark, colorLight, label) {
  let grd = ctx.createLinearGradient(x, y, x, y + h);
  grd.addColorStop(0, colorLight);
  grd.addColorStop(1, colorDark);
  ctx.fillStyle = grd;
  
  const r = 6;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
  
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + r + 2, y + 2);
  ctx.lineTo(x + w - r - 2, y + 2);
  ctx.stroke();
  
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${h > 30 ? 16 : 12}px sans-serif`;  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  ctx.fillText(label, x + w/2, y + h/2);
  ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';
}

function drawArrow(ctx, x, y, len, color) {
  if (Math.abs(len) < 1) return;
  ctx.strokeStyle = color; 
  ctx.fillStyle = color; 
  ctx.lineWidth = 2.5;
  ctx.shadowColor = color;
  ctx.shadowBlur = 4;
  ctx.beginPath(); 
  ctx.moveTo(x, y); 
  ctx.lineTo(x + len, y); 
  ctx.stroke();
  const s = Math.sign(len);
  ctx.beginPath();
  ctx.moveTo(x + len, y);
  ctx.lineTo(x + len - s * 8, y - 5);
  ctx.lineTo(x + len - s * 8, y + 5);
  ctx.closePath(); 
  ctx.fill();
  ctx.shadowBlur = 0;
}

/* ========= 渲染：x-t 图 ========= */
function drawGraph(time) {
  const ctx = graphCtx;
  const W = graphSize.w, H = graphSize.h;
  ctx.clearRect(0, 0, W, H);
  
  let bgGrd = ctx.createLinearGradient(0, 0, 0, H);
  bgGrd.addColorStop(0, '#0f172a');
  bgGrd.addColorStop(1, '#020617');
  ctx.fillStyle = bgGrd;
  ctx.fillRect(0, 0, W, H);

  if (!sim || sim.samples.length < 2) return;

  const margin = { left: 60, right: 40, top: 30, bottom: 50 };
  const pW = W - margin.left - margin.right;
  const pH = H - margin.top - margin.bottom;

  const maxT = Math.max(0.1, sim.totalTime);
  let minX = Infinity, maxX = -Infinity;  sim.samples.forEach(s => {
    if (s.xS < minX) minX = s.xS;
    if (s.xS > maxX) maxX = s.xS;
    if (s.xB < minX) minX = s.xB;
    if (s.xB > maxX) maxX = s.xB;
  });
  
  minX = Math.min(minX, sim.wallX);
  maxX = Math.max(maxX, sim.junctionX);
  
  const pad = (maxX - minX) * 0.1;
  minX -= pad; maxX += pad;

  const sx = t => margin.left + (t / maxT) * pW;
  const sy = x => margin.top + pH - ((x - minX) / (maxX - minX)) * pH;

  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    let y = margin.top + i * pH / 5;
    ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(margin.left + pW, y); ctx.stroke();
  }
  for (let i = 0; i <= 8; i++) {
    let x = margin.left + i * pW / 8;
    ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, margin.top + pH); ctx.stroke();
  }

  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1.5;
  
  let wY = sy(sim.wallX);
  ctx.strokeStyle = 'rgba(148, 163, 184, 0.4)';
  ctx.beginPath(); ctx.moveTo(margin.left, wY); ctx.lineTo(margin.left + pW, wY); ctx.stroke();
  ctx.fillStyle = '#64748b'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('墙 (Wall)', margin.left + 5, wY - 5);

  let jY = sy(sim.junctionX);
  ctx.strokeStyle = 'rgba(251, 191, 36, 0.4)';
  ctx.beginPath(); ctx.moveTo(margin.left, jY); ctx.lineTo(margin.left + pW, jY); ctx.stroke();
  ctx.fillStyle = '#d97706';
  ctx.fillText('交界 (Junction)', margin.left + 5, jY - 5);
  
  ctx.setLineDash([]);

  ctx.strokeStyle = '#475569';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(margin.left, margin.top);
  ctx.lineTo(margin.left, margin.top + pH);
  ctx.lineTo(margin.left + pW, margin.top + pH);  ctx.stroke();
  
  ctx.fillStyle = '#475569';
  ctx.beginPath(); ctx.moveTo(margin.left, margin.top - 5); ctx.lineTo(margin.left - 4, margin.top + 5); ctx.lineTo(margin.left + 4, margin.top + 5); ctx.fill();
  ctx.beginPath(); ctx.moveTo(margin.left + pW + 5, margin.top + pH); ctx.lineTo(margin.left + pW - 5, margin.top + pH - 4); ctx.lineTo(margin.left + pW - 5, margin.top + pH + 4); ctx.fill();

  ctx.fillStyle = '#94a3b8'; ctx.font = '11px Consolas, monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    let val = minX + (maxX - minX) * (1 - i / 5);
    ctx.fillText(val.toFixed(0), margin.left - 8, margin.top + i * pH / 5 + 4);
  }
  ctx.textAlign = 'center';
  for (let i = 0; i <= 8; i++) {
    let val = maxT * i / 8;
    ctx.fillText(val.toFixed(1), margin.left + i * pW / 8, margin.top + pH + 20);
  }
  
  ctx.fillStyle = '#cbd5e1'; ctx.font = 'bold 12px sans-serif';
  ctx.fillText('时间 t (s)', margin.left + pW / 2, H - 10);
  ctx.save();
  ctx.translate(15, margin.top + pH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('位置 x (px)', 0, 0);
  ctx.restore();

  ctx.save();
  ctx.beginPath();
  ctx.rect(margin.left, margin.top, pW, pH);
  ctx.clip();

  function drawCurve(color, dataKey) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    sim.samples.forEach((s, i) => {
      let px = sx(s.t), py = sy(s[dataKey]);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  drawCurve('#f87171', 'xS'); 
  drawCurve('#60a5fa', 'xB'); 

  sim.keyframes.forEach(k => {
    if (k.phase === 'collision') {      let px = sx(k.t), py = sy(k.xS);
      ctx.fillStyle = '#fbbf24';
      ctx.shadowColor = '#fbbf24';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(px, py, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  });

  let curX = sx(time);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(curX, margin.top);
  ctx.lineTo(curX, margin.top + pH);
  ctx.stroke();
  ctx.setLineDash([]);
  
  let curState = sim.getStateAt(time);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(curX, sy(curState.xS), 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(curX, sy(curState.xB), 4, 0, Math.PI*2); ctx.fill();

  ctx.restore(); 

  ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillStyle = '#f87171'; ctx.fillRect(margin.left + 20, margin.top + 10, 16, 4);
  ctx.fillStyle = '#e2e8f0'; ctx.fillText('小方块 m', margin.left + 42, margin.top + 15);
  
  ctx.fillStyle = '#60a5fa'; ctx.fillRect(margin.left + 130, margin.top + 10, 16, 4);
  ctx.fillStyle = '#e2e8f0'; ctx.fillText('大方块 km', margin.left + 152, margin.top + 15);
  
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath(); ctx.arc(margin.left + 250, margin.top + 12, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e2e8f0'; ctx.fillText('碰撞点', margin.left + 260, margin.top + 15);
}

function drawWelcome() {
  animCtx.fillStyle = '#020617';
  animCtx.fillRect(0, 0, animSize.w, animSize.h);
  animCtx.fillStyle = '#38bdf8';
  animCtx.font = 'bold 16px sans-serif';
  animCtx.textAlign = 'center';
  animCtx.textBaseline = 'middle';  animCtx.fillText('调整参数后点击「开始模拟」', animSize.w / 2, animSize.h / 2);
  
  graphCtx.fillStyle = '#020617';
  graphCtx.fillRect(0, 0, graphSize.w, graphSize.h);
  graphCtx.fillStyle = '#64748b';
  graphCtx.font = '14px sans-serif';
  graphCtx.fillText('x-t 轨迹图将在此处实时绘制', graphSize.w / 2, graphSize.h / 2);
}

/* ========= 动画主循环 ========= */
function loop(timestamp) {
  if (!startTime) startTime = timestamp;
  currentTime = (timestamp - startTime) / 1000 * params.speed;
  
  if (currentTime >= sim.totalTime) {
    currentTime = sim.totalTime;
    isRunning = false;
    document.getElementById('start-btn').textContent = '✓ 模拟结束';
  }
  
  drawAnim(currentTime);
  drawGraph(currentTime);
  
  if (isRunning) {
    animId = requestAnimationFrame(loop);
  }
}

/* ========= UI 绑定 ========= */
function bind(id, key, disp, fmt) {
  const el = document.getElementById(id);
  el.addEventListener('input', e => {
    params[key] = parseFloat(e.target.value);
    document.getElementById(disp).textContent = fmt(params[key]);
  });
}
bind('k', 'k', 'k-val', v => v.toFixed(1));
bind('v', 'v0', 'v-val', v => v.toFixed(0));
bind('f', 'f', 'f-val', v => v.toFixed(0));
bind('spd', 'speed', 'spd-val', v => v.toFixed(1) + '×');

document.getElementById('start-btn').addEventListener('click', () => {
  if (isRunning) return;
  if (animId) cancelAnimationFrame(animId);
  
  try {
    sim = new Simulation(params.k, params.v0, params.f);
  } catch(e) {
    console.error("Simulation error:", e);
    return;  }
  
  const th = theoryCorrected(params.k, params.v0, params.f);
  
  document.getElementById('theory-n').textContent = th.N;
  document.getElementById('theory-s').textContent = th.S.toFixed(1);
  document.getElementById('actual-n').textContent = sim.collisionCount;
  document.getElementById('actual-s').textContent = sim.totalDistance.toFixed(1);
  
  startTime = 0;
  currentTime = 0;
  isRunning = true;
  document.getElementById('start-btn').textContent = '⏳ 运行中...';
  animId = requestAnimationFrame(loop);
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (animId) cancelAnimationFrame(animId);
  isRunning = false;
  sim = null;
  initCanvases();
  drawWelcome();
  document.getElementById('actual-n').textContent = '0';
  document.getElementById('actual-s').textContent = '0.0';
  document.getElementById('theory-n').textContent = '–';
  document.getElementById('theory-s').textContent = '–';
  document.getElementById('start-btn').textContent = '▶ 开始模拟';
});

window.onload = () => {
  initCanvases();
  drawWelcome();
};
</script>
